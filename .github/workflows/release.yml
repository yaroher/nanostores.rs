name: release

# Triggered by pushing a vX.Y.Z tag (see `make release`). Re-runs the full CI
# suite, creates a GitHub release with generated notes, and publishes the
# workspace crates to crates.io.
#
# Required repository secrets:
#   CARGO_REGISTRY_TOKEN - crates.io API token (publish scope)
#   NPM_TOKEN            - npm automation token (publish scope)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  create-release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --verify-tag --generate-notes --title "$TAG"

  crates:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish to crates.io (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: make publish-crates

  npm:
    needs: crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm run build --workspace nanostores-wasm
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: make publish-npm
