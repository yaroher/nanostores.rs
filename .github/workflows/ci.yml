name: ci

on:
  push:
    branches: [master]
  pull_request:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_DEV_DEBUG: 0

jobs:
  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo doc --workspace --no-deps

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - run: cargo build --target wasm32-unknown-unknown -p nanostores -p nanostores-wasm -p browser-app-core
      - run: cargo clippy --target wasm32-unknown-unknown -p nanostores -p nanostores-wasm -p browser-app-core -- -D warnings

  browser:
    runs-on: ubuntu-latest
    # chromedriver/chrome are flaky in CI — do not block merges
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - run: make test-browser

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - run: make test-js
